<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Particle Galaxy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: #fff;
    cursor: crosshair;
  }
  canvas { display: block; }
  .ui {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 10;
    pointer-events: none;
  }
  .ui h1 {
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 6px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #ff6fd8, #3813c2, #00fff0);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .ui p {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
  }
  .controls {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
  }
  .controls button {
    pointer-events: all;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.7);
    padding: 10px 20px;
    border-radius: 999px;
    font-size: 13px;
    letter-spacing: 1px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
  }
  .controls button:hover {
    background: rgba(255,255,255,0.12);
    color: #fff;
    border-color: rgba(255,255,255,0.3);
  }
  .controls button.active {
    background: rgba(255,111,216,0.2);
    border-color: rgba(255,111,216,0.5);
    color: #ff6fd8;
  }
  .stats {
    position: fixed;
    top: 24px;
    right: 24px;
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    text-align: right;
    letter-spacing: 1px;
    z-index: 10;
  }
</style>
</head>
<body>
<div class="ui">
  <h1>Particle Galaxy</h1>
  <p>Move your mouse to interact</p>
</div>
<div class="stats" id="stats"></div>
<div class="controls">
  <button class="active" onclick="setMode('galaxy')">Galaxy</button>
  <button onclick="setMode('fireworks')">Fireworks</button>
  <button onclick="setMode('flow')">Flow Field</button>
  <button onclick="setMode('attract')">Attract</button>
</div>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const stats = document.getElementById('stats');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let mouse = { x: W / 2, y: H / 2, pressed: false };
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mousedown', () => mouse.pressed = true);
window.addEventListener('mouseup', () => mouse.pressed = false);
window.addEventListener('touchmove', e => {
  e.preventDefault();
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
}, { passive: false });
window.addEventListener('touchstart', e => {
  mouse.pressed = true;
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
});
window.addEventListener('touchend', () => mouse.pressed = false);

let mode = 'galaxy';
const palettes = {
  galaxy: ['#ff6fd8','#3813c2','#00fff0','#ff9a56','#a855f7'],
  fireworks: ['#ff4444','#ffaa00','#ffff44','#44ff44','#4488ff','#ff44ff'],
  flow: ['#00fff0','#0088ff','#0044aa','#00ffaa','#88ffff'],
  attract: ['#ff6fd8','#ff9a56','#ffdd57','#a855f7','#ec4899'],
};

function setMode(m) {
  mode = m;
  document.querySelectorAll('.controls button').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase() === m);
  });
  if (m === 'fireworks') particles.length = 0;
}

class Particle {
  constructor(x, y, color, opts = {}) {
    this.x = x;
    this.y = y;
    this.ox = x;
    this.oy = y;
    this.vx = opts.vx || (Math.random() - 0.5) * 2;
    this.vy = opts.vy || (Math.random() - 0.5) * 2;
    this.size = opts.size || Math.random() * 2.5 + 0.5;
    this.color = color;
    this.life = opts.life || 1;
    this.decay = opts.decay || 0;
    this.alpha = 1;
    this.angle = Math.random() * Math.PI * 2;
    this.speed = Math.random() * 0.5 + 0.2;
    this.orbit = Math.random() * 100 + 50;
  }
}

let particles = [];
const MAX = 3000;
let time = 0;
let noiseScale = 0.003;

// Simple noise function
function noise(x, y) {
  const n = Math.sin(x * 12.9898 + y * 78.233) * 43758.5453;
  return n - Math.floor(n);
}

function flowAngle(x, y, t) {
  return noise(x * noiseScale + t * 0.2, y * noiseScale + t * 0.1) * Math.PI * 4;
}

function initGalaxy() {
  particles = [];
  for (let i = 0; i < 1500; i++) {
    const angle = Math.random() * Math.PI * 2;
    const r = Math.random() * Math.min(W, H) * 0.35;
    const x = W / 2 + Math.cos(angle) * r;
    const y = H / 2 + Math.sin(angle) * r;
    const color = palettes.galaxy[Math.floor(Math.random() * palettes.galaxy.length)];
    const p = new Particle(x, y, color);
    p.orbit = r;
    p.angle = angle;
    particles.push(p);
  }
}

function spawnFirework(x, y) {
  const color = palettes.fireworks[Math.floor(Math.random() * palettes.fireworks.length)];
  const count = 60 + Math.random() * 40;
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2;
    const speed = Math.random() * 6 + 2;
    particles.push(new Particle(x, y, color, {
      vx: Math.cos(angle) * speed + (Math.random() - 0.5),
      vy: Math.sin(angle) * speed + (Math.random() - 0.5),
      size: Math.random() * 3 + 1,
      life: 1,
      decay: 0.008 + Math.random() * 0.008,
    }));
  }
}

function initFlow() {
  particles = [];
  for (let i = 0; i < 2000; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const color = palettes.flow[Math.floor(Math.random() * palettes.flow.length)];
    particles.push(new Particle(x, y, color, { size: Math.random() * 1.5 + 0.5 }));
  }
}

function initAttract() {
  particles = [];
  for (let i = 0; i < 1500; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const color = palettes.attract[Math.floor(Math.random() * palettes.attract.length)];
    particles.push(new Particle(x, y, color, { size: Math.random() * 2 + 1 }));
  }
}

initGalaxy();

let lastFirework = 0;

function update() {
  time += 0.01;

  if (mode === 'galaxy') {
    if (particles.length < 800) initGalaxy();
    for (const p of particles) {
      p.angle += p.speed * 0.005;
      const targetX = W / 2 + Math.cos(p.angle) * p.orbit;
      const targetY = H / 2 + Math.sin(p.angle) * p.orbit * 0.6;

      const dx = mouse.x - p.x;
      const dy = mouse.y - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < 200) {
        const force = (200 - dist) / 200;
        const repel = mouse.pressed ? -1 : 1;
        p.vx += (dx / dist) * force * 0.8 * repel;
        p.vy += (dy / dist) * force * 0.8 * repel;
      }

      p.vx += (targetX - p.x) * 0.01;
      p.vy += (targetY - p.y) * 0.01;
      p.vx *= 0.95;
      p.vy *= 0.95;
      p.x += p.vx;
      p.y += p.vy;
    }
  }

  if (mode === 'fireworks') {
    if (mouse.pressed && Date.now() - lastFirework > 100) {
      spawnFirework(mouse.x, mouse.y);
      lastFirework = Date.now();
    }
    if (!mouse.pressed && Math.random() < 0.03) {
      spawnFirework(Math.random() * W, Math.random() * H * 0.6 + H * 0.1);
    }
    for (const p of particles) {
      p.vy += 0.03;
      p.vx *= 0.99;
      p.vy *= 0.99;
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;
      p.alpha = p.life;
      p.size *= 0.998;
    }
    particles = particles.filter(p => p.life > 0);
  }

  if (mode === 'flow') {
    if (particles.length < 1000) initFlow();
    for (const p of particles) {
      const angle = flowAngle(p.x, p.y, time);
      p.vx += Math.cos(angle) * 0.3;
      p.vy += Math.sin(angle) * 0.3;

      const dx = mouse.x - p.x;
      const dy = mouse.y - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 150) {
        p.vx += (dx / dist) * 1.5;
        p.vy += (dy / dist) * 1.5;
      }

      p.vx *= 0.96;
      p.vy *= 0.96;
      p.x += p.vx;
      p.y += p.vy;

      if (p.x < 0) p.x = W;
      if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H;
      if (p.y > H) p.y = 0;
    }
  }

  if (mode === 'attract') {
    if (particles.length < 800) initAttract();
    for (const p of particles) {
      const dx = mouse.x - p.x;
      const dy = mouse.y - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy) + 1;

      if (mouse.pressed) {
        p.vx += (dx / dist) * 3;
        p.vy += (dy / dist) * 3;
      } else {
        const force = Math.min(5, 500 / dist);
        p.vx += (dx / dist) * force * 0.15;
        p.vy += (dy / dist) * force * 0.15;
      }

      // orbit around mouse
      const perpX = -dy / dist;
      const perpY = dx / dist;
      p.vx += perpX * 0.3;
      p.vy += perpY * 0.3;

      p.vx *= 0.97;
      p.vy *= 0.97;
      p.x += p.vx;
      p.y += p.vy;

      if (p.x < -50) p.x = W + 50;
      if (p.x > W + 50) p.x = -50;
      if (p.y < -50) p.y = H + 50;
      if (p.y > H + 50) p.y = -50;
    }
  }
}

function draw() {
  ctx.fillStyle = 'rgba(10, 10, 15, 0.15)';
  ctx.fillRect(0, 0, W, H);

  for (const p of particles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.globalAlpha = (p.alpha || 1) * 0.8;
    ctx.fill();

    // glow
    if (p.size > 1.5) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * 3, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = (p.alpha || 1) * 0.08;
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  // connection lines for attract mode
  if (mode === 'attract' || mode === 'galaxy') {
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < Math.min(i + 10, particles.length); j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = dx * dx + dy * dy;
        if (dist < 3000) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.stroke();
        }
      }
    }
  }

  stats.textContent = `${particles.length} particles`;
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
